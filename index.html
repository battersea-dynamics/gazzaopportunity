<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gazza</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: #000;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  .stage {
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .scene {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
  }

  .scene img { display: block; object-fit: contain; }

  #scene-bird img  { width: 50vw; }
  #scene-gazza img { width: 70vw; }
  #scene-opp img   { width: 80vw; }

  #scene-all {
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 6px;
  }

  #scene-all .bird-wrap,
  #scene-all .gazza-wrap,
  #scene-all .opp-wrap,
  #scene-all .btn-wrap {
    display: flex;
    justify-content: center;
    opacity: 0;
    transform: translateY(14px);
  }

  #scene-all .bird-wrap  img { width: 20vw; }
  #scene-all .gazza-wrap img { width: 40vw; }
  #scene-all .opp-wrap   img { width: 50vw; }

  #scene-all .btn-wrap { margin-top: 24px; }

  #enter-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.35);
    color: rgba(255,255,255,0.55);
    font-family: 'Georgia', serif;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    padding: 8px 22px;
    cursor: pointer;
    transition: color 0.4s ease, border-color 0.4s ease;
    outline: none;
  }

  #enter-btn:hover {
    color: rgba(255,255,255,0.9);
    border-color: rgba(255,255,255,0.7);
  }
</style>
</head>

      <button id="enter-btn" onclick="window.location.href='coming-soon.html'">enter</button>

</div>

<script>
  const fadeIn = (el, dur) => new Promise(res => {
    el.style.transition = `opacity ${dur}ms ease`;
    el.style.opacity = 1;
    setTimeout(res, dur);
  });

  const fadeOut = (el, dur) => new Promise(res => {
    el.style.transition = `opacity ${dur}ms ease`;
    el.style.opacity = 0;
    setTimeout(res, dur);
  });

  const wait = ms => new Promise(res => setTimeout(res, ms));

  const fadeInChild = (el, dur) => new Promise(res => {
    el.style.transition = `opacity ${dur}ms ease, transform ${dur}ms ease`;
    el.style.opacity = 1;
    el.style.transform = 'translateY(0)';
    setTimeout(res, dur);
  });

  async function run() {
    const bird  = document.getElementById('scene-bird');
    const gazza = document.getElementById('scene-gazza');
    const opp   = document.getElementById('scene-opp');
    const all   = document.getElementById('scene-all');
    const birdC  = all.querySelector('.bird-wrap');
    const gazzaC = all.querySelector('.gazza-wrap');
    const oppC   = all.querySelector('.opp-wrap');
    const btnC   = all.querySelector('.btn-wrap');

    await wait(800);

    await fadeIn(bird, 2200);
    await wait(1600);
    await fadeOut(bird, 900);
    await wait(300);

    await fadeIn(gazza, 2200);
    await wait(1600);
    await fadeOut(gazza, 900);
    await wait(300);

    await fadeIn(opp, 2200);
    await wait(1600);
    await fadeOut(opp, 900);
    await wait(300);

    all.style.transition = 'opacity 100ms';
    all.style.opacity = 1;
    all.style.pointerEvents = 'auto';
    await wait(150);
    await fadeInChild(birdC,  1100);
    await wait(250);
    await fadeInChild(gazzaC, 1100);
    await wait(250);
    await fadeInChild(oppC,   1100);
    await wait(400);
    await fadeInChild(btnC,   900);
  }

  run();
</script>
